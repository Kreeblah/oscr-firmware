;
; ==================== ATmega2560 ====================
;

;
; MEGA EMBED/MINI module
;

[board:mega-embed]
extends = mcu:atmega2560
board = megaatmega2560
monitor_speed = 250000
board.build_src_flags =
  ${this.arch.build_src_flags}
  ${this.mcu.build_src_flags}
  -D OSCR_BAUD=${this.monitor_speed}
board.build_flags =
  ${this.arch.build_flags}
  ${this.mcu.build_flags}
  -D OSCR_BAUD=${this.monitor_speed}
board.extra_scripts =


;
; OSCR Integrated ATmega2560
;

[board:oscr-mega]
extends = mcu:atmega2560
board = atmega2560-urboot
board_upload.speed = 250000
board_upload.protocol = urclock
board_bootloader.type = urboot
board_bootloader.file = bootloader/avr/urboot-obm.hex
board_bootloader.lfuse = 0xFF
board_bootloader.hfuse = 0xDC
board_bootloader.efuse = 0xFD
board_bootloader.lock_bits=0x0F
board_bootloader.unlock_bits=0x3F
board_bootloader.protocol = stk500v1
board_bootloader.port = COM7
board_bootloader.upload_speed = 250000

monitor_speed = 250000

board.build_src_flags =
  ${this.arch.build_src_flags}
  ${this.mcu.build_src_flags}
  -D OSCR_BAUD=${this.monitor_speed}
board.build_flags =
  ${env.build_flags}
  ${this.arch.build_flags}
  ${this.mcu.build_flags}
  -D OSCR_BAUD=${this.monitor_speed}
board.extra_scripts =
